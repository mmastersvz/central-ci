name: Security Scans

on:
  workflow_call:
    inputs:
      app-name:
        description: "The name of the application"
        required: true
        type: string
      app-dir:
        description: "The directory to scan"
        required: false
        default: "."
        type: string

jobs:
  init-security-scans:
    name: Initial security scans
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for Secrets
        uses: mmastersvz/central-ci/actions/secret-scan@main

      - name: "Security Scan: Trivy (source code)"
        uses: mmastersvz/central-ci/actions/trivy-source-scan@main
        with:
          app-name: ${{ inputs.app-name }}
          scan-ref: ${{ inputs.app-dir }}
