name: "Release"

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: "Tag and release"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: "Setup git config"
        uses: ./actions/setup-git-config

      - name: "Resolve version"
        id: version
        uses: ./actions/resolve-version

      - name: "Generate changelog"
        id: changelog
        uses: ./actions/changelog
        with:
          previous-tag: ${{ steps.version.outputs.previous-tag }}
          new-tag: ${{ steps.version.outputs.new-tag }}

      - name: "Create and push tag"
        uses: ./actions/git-tag
        with:
          new-tag: ${{ steps.version.outputs.new-tag }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: "Create GitHub release"
        uses: ./actions/gh-release
        with:
          tag: ${{ steps.version.outputs.new-tag }}
          title: ${{ steps.version.outputs.marketing-version }}
          token: ${{ secrets.GITHUB_TOKEN }}
          notes: ${{ steps.changelog.outputs.notes }}
          release-type: ${{ steps.version.outputs.release-type }}
          previous-tag: ${{ steps.version.outputs.previous-tag }}

      - name: "Move major version tag"
        uses: ./actions/move-major-tag
        with:
          tag: ${{ steps.version.outputs.new-tag }}
          token: ${{ secrets.GITHUB_TOKEN }}
