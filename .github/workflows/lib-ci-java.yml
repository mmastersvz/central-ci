name: "CI: Java (reusable)"

on:
  workflow_call:
    inputs:
      app-name:
        required: true
        type: string
      app-dir:
        required: false
        type: string
        default: "."
      language:
        required: false
        default: "java"
        type: string
      tool-versions-path:
        required: false
        default: "./.tool-versions"
        type: string
      dast-on-pr:
        description: "Run ZAP baseline DAST scan on pull requests"
        required: false
        type: boolean
        default: true
      dast-on-push:
        description: "Run ZAP baseline DAST scan on push to main"
        required: false
        type: boolean
        default: true

    secrets:
      github-token:
        required: true

    outputs:
      build-version:
        description: "The resolved build version"
        value: ${{ jobs.setup.outputs.build-version }}

permissions:
  contents: read
  packages: write # Needed for GHCR images
  security-events: write # If you upload SARIF results (Trivy, etc.)

concurrency:
  group: ${{ github.event_name == 'pull_request' && github.run_id || format('{0}-main', inputs.app-name) }}
  cancel-in-progress: false

jobs:
  secrets:
    name: "Security: Secrets"
    runs-on: ubuntu-latest
    steps:
      - name: "Security: Secrets Scanning"
        uses: mmastersvz/central-ci/actions/security-secrets-scans@main
        with:
          github-token: ${{ secrets.github-token }}

  sast-pre:
    name: "Security: SAST | Pre build"
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: mmastersvz/central-ci/actions/security-sast-pre-scans@main
        with:
          working-directory: ${{ inputs.app-dir }}

  sca:
    name: "Security: SCA"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "Security: SCA Scanning"
        uses: mmastersvz/central-ci/actions/security-sca-scans@main
        with:
          app-name: ${{ inputs.app-name }}
          scan-ref: ${{ inputs.app-dir }}

  setup:
    name: "Setup"
    runs-on: ubuntu-latest
    outputs:
      build-version: ${{ steps.prep.outputs.build-version }}
      new-tag:       ${{ steps.prep.outputs.new-tag }}
      previous-tag:  ${{ steps.prep.outputs.previous-tag }}
      release-type:  ${{ steps.prep.outputs.release-type }}
      docker-push: ${{ steps.setup-docker.outputs.docker-push }}
      java-distribution: ${{ steps.tools.outputs.java-distribution }}
      java-version: ${{ steps.tools.outputs.java-version }}
      maven-version: ${{ steps.tools.outputs.maven-version }}
      docker-tags: ${{ steps.setup-docker.outputs.docker-tags }}
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "Setup: CI"
        id: prep
        uses: mmastersvz/central-ci/actions/setup@main
        with:
          service-name: ${{ inputs.app-name }}
          github-token: ${{ secrets.github-token }}

      - name: Parse .tool-versions
        id: tools
        shell: bash
        run: |
          set -euo pipefail
          while IFS=' ' read -r tool version || [[ -n "$tool" ]]; do
            [[ -z "$tool" || "$tool" == \#* ]] && continue

            case "$tool" in
              java)
                # temurin-21.0.7+6.0.LTS → distribution=temurin, version=21
                distribution="${version%%-*}"          # everything before first "-"
                full_version="${version#*-}"           # everything after first "-"
                major="${full_version%%.*}"            # everything before first "."
                echo "java-distribution=${distribution}" >> "$GITHUB_OUTPUT"
                echo "java-version=${major}"             >> "$GITHUB_OUTPUT"
                ;;
              maven)
                echo "maven-version=${version}" >> "$GITHUB_OUTPUT"
                ;;
            esac
          done < .tool-versions

      - name: "Setup: Docker Metadata"
        id: setup-docker
        uses: mmastersvz/central-ci/actions/setup-docker@main
        with:
          app-name: ${{ inputs.app-name }}
          app-version: ${{ steps.prep.outputs.build-version }}

      - name: "Setup: JDK"
        uses: actions/setup-java@v4
        with:
          distribution: "${{ steps.tools.outputs.java-distribution }}"
          java-version: "${{ steps.tools.outputs.java-version }}"
          cache: maven

      - name: "Lint: Java Checkstyle"
        working-directory: ${{ inputs.app-dir }}
        run: mvn checkstyle:check

      - name: "Lint: Java PMD"
        working-directory: ${{ inputs.app-dir }}
        run: mvn pmd:check

  build:
    name: "Build & Test"
    runs-on: ubuntu-latest
    needs: setup
    defaults:
      run:
        working-directory: ${{ inputs.app-dir }}

    steps:
      - uses: actions/checkout@v4

      - name: "Setup: JDK ${{ needs.setup.outputs.java-version }}"
        uses: actions/setup-java@v4
        with:
          java-version: ${{ needs.setup.outputs.java-version }}
          distribution: ${{ needs.setup.outputs.java-distribution }}
          cache: maven

      - name: "Setup: Maven ${{ needs.setup.outputs.maven-version }}"
        uses: stCarolas/setup-maven@v5
        with:
          maven-version: ${{ needs.setup.outputs.maven-version }}

      - name: "Maven set app version: ${{ needs.setup.outputs.build-version }}"
        shell: bash
        env:
          VERSION: ${{ needs.setup.outputs.build-version }}
        run: |
          set -euo pipefail
          mvn -B versions:set -DnewVersion="${VERSION}"

      - name: "Security: SAST | Post build (CodeQL init)"
        uses: github/codeql-action/init@v4
        with:
          languages: java
          build-mode: autobuild
          # category is set at analyze step
        # Note: CodeQL init must run before the Maven build so it can observe compilation

      - name: Build and test
        run: mvn -B verify

      - name: "Security: Maven Dependency Audit"
        shell: bash
        run: |
          set -euo pipefail
          mvn -B org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=7 \
            -DsuppressionsLocation=.github/owasp-suppressions.xml 2>/dev/null || \
          mvn -B org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=7

      - name: "Security: SAST | Post build (CodeQL analyze)"
        id: codeql-analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: codeql-${{ inputs.app-name }}
          upload: false

      - name: "Docker: Build and Publish Image"
        uses: mmastersvz/central-ci/actions/docker-publish@main
        with:
          registry-password: ${{ secrets.github-token }}
          docker-push: ${{ needs.setup.outputs.docker-push }}
          docker-tags: ${{ needs.setup.outputs.docker-tags }}
          context: ${{ inputs.app-dir }}
          cache-scope: ${{ inputs.app-name }}

      - name: "Security: DAST | ZAP Baseline"
        if: >-
          ${{
            (github.event_name == 'pull_request' && inputs.dast-on-pr) ||
            (github.event_name != 'pull_request' && inputs.dast-on-push)
          }}
        uses: mmastersvz/central-ci/actions/security-dast-zap@main
        with:
          image-ref: ${{ needs.setup.outputs.docker-tags }}
          load-local: ${{ needs.setup.outputs.docker-push != 'true' }}
          build-context: ./${{ inputs.app-dir }}
          cache-scope: ${{ inputs.app-name }}
          github-token: ${{ secrets.github-token }}

      - name: "Security: Container"
        if: ${{ needs.setup.outputs.docker-push == 'true' }}
        uses: mmastersvz/central-ci/actions/trivy-image-scan@main
        with:
          app-name: ${{ inputs.app-name }}
          image-ref: ${{ needs.setup.outputs.docker-tags }}

  release:
    name: "Tag and Release"
    runs-on: ubuntu-latest
    needs: [setup, build]
    if: github.event_name != 'pull_request'
    permissions:
      contents: write
    steps:
      - uses: mmastersvz/central-ci/actions/release@main
        with:
          new-tag:       ${{ needs.setup.outputs.new-tag }}
          build-version: ${{ needs.setup.outputs.build-version }}
          previous-tag:  ${{ needs.setup.outputs.previous-tag }}
          release-type:  ${{ needs.setup.outputs.release-type }}
          token:         ${{ secrets.github-token }}
