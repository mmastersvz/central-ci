name: "CI: dotnet (reusable)"

on:
  workflow_call:
    inputs:
      app-name:
        required: true
        type: string
      app-dir:
        required: false
        type: string
        default: "."
      dast-on-pr:
        description: "Run ZAP baseline DAST scan on pull requests"
        required: false
        type: boolean
        default: true
      dast-on-push:
        description: "Run ZAP baseline DAST scan on push to main"
        required: false
        type: boolean
        default: true
      language:
        required: false
        default: "dotnet"
        type: string
      project-path:
        required: true
        type: string
      tool-versions-path:
        required: false
        type: string
        default: "./.tool-versions"
    secrets:
      github-token:
        required: true

concurrency:
  group: ${{ github.event_name == 'pull_request' && github.run_id || format('{0}-main', inputs.app-name) }}
  cancel-in-progress: false

jobs:
  secrets:
    name: "Security: Secrets"
    runs-on: ubuntu-latest
    steps:
      - name: "Security: Secrets Scanning"
        uses: mmastersvz/central-ci/actions/security-secrets-scans@main
        with:
          github-token: ${{ secrets.github-token }}

  sast-pre:
    name: "Security: SAST | Pre build"
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - name: "Security: SAST Pre-Scan"
        uses: mmastersvz/central-ci/actions/security-sast-pre-scans@main
        with:
          working-directory: ${{ inputs.app-dir }}

  sca:
    name: "Security: SCA"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: "Security: SCA Scanning"
        uses: mmastersvz/central-ci/actions/security-sca-scans@main
        with:
          app-name: ${{ inputs.app-name }}
          scan-ref: ${{ inputs.app-dir }}

  setup:
    name: "Setup"
    runs-on: ubuntu-latest
    outputs:
      build-version: ${{ steps.prep.outputs.build-version }}
      new-tag:       ${{ steps.prep.outputs.new-tag }}
      previous-tag:  ${{ steps.prep.outputs.previous-tag }}
      release-type:  ${{ steps.prep.outputs.release-type }}
      docker-push: ${{ steps.setup-docker.outputs.docker-push }}
      dotnet-version: ${{ steps.setup-app.outputs.dotnet-version }}
      docker-tags: ${{ steps.setup-docker.outputs.docker-tags }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: "Setup: CI"
        id: prep
        uses: mmastersvz/central-ci/actions/setup@main
        with:
          service-name: ${{ inputs.app-name }}
          github-token: ${{ secrets.github-token }}

      - name: "Setup: APP"
        id: setup-app
        shell: bash
        run: |
          tool_version=$(grep "^${{ inputs.language }} " "${{ inputs.tool-versions-path }}" | awk '{print $2}')
          if [ -z "$tool_version" ]; then
            echo "::error::Tool '${{ inputs.language }}' not found in ${{ inputs.tool-versions-path }}"
            exit 1
          fi
          echo "dotnet-version=${tool_version}" >> "$GITHUB_OUTPUT"

      - name: "Setup: Docker Metadata"
        id: setup-docker
        uses: mmastersvz/central-ci/actions/setup-docker@main
        with:
          app-name: ${{ inputs.app-name }}
          app-version: ${{ steps.prep.outputs.build-version }}

      - name: "Setup: .NET"
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ steps.setup-app.outputs.dotnet-version }}

      - name: "Cache: NuGet packages"
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/packages.lock.json', '**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: "Lint: Dotnet Format"
        run: dotnet format ${{ inputs.app-dir }} --verify-no-changes

  build:
    name: "Build & Test"
    runs-on: ubuntu-latest
    needs: setup
    defaults:
      run:
        working-directory: ${{ inputs.app-dir }}

    steps:
      - uses: actions/checkout@v6

      - name: "Cache: NuGet packages"
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/packages.lock.json', '**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: "Build: .NET and Test"
        uses: mmastersvz/central-ci/actions/dotnet-build-test@main
        with:
          build-version: ${{ needs.setup.outputs.build-version }}
          dotnet-version: ${{ needs.setup.outputs.dotnet-version }}
          project-path: ${{ inputs.project-path }}
          working-directory: ${{ inputs.app-dir }}

      - name: "Security: NuGet Audit"
        shell: bash
        working-directory: ${{ inputs.app-dir }}
        run: |
          set -euo pipefail
          output=$(dotnet list ${{ inputs.project-path }} package --vulnerable --include-transitive)
          echo "$output"
          if echo "$output" | grep -q "has the following vulnerable packages"; then
            echo "::error::Vulnerable NuGet packages found — review output above"
            exit 1
          fi

      - name: "Security: SAST | Post build"
        uses: mmastersvz/central-ci/actions/security-sast-post-scans@main
        with:
          codeql-languages: csharp # TODO add to setup
          codeql-build-mode: none
          # codeql-config-file: .github/codeql/csharp-config.yml
          # codeql-category-suffix: dotnet
          codeql-category-suffix: ${{ inputs.app-name }}
          working-directory: ${{ inputs.app-dir }}
          do-checkout: false

      - name: "Docker: Build and Publish Image"
        uses: mmastersvz/central-ci/actions/docker-publish@main
        with:
          registry-password: ${{ secrets.github-token }}
          docker-push: ${{ needs.setup.outputs.docker-push }}
          docker-tags: ${{ needs.setup.outputs.docker-tags }}
          context: ./${{ inputs.app-dir }}
          cache-scope: ${{ inputs.app-name }}

      - name: "Security: DAST | ZAP Baseline"
        if: >-
          ${{
            (github.event_name == 'pull_request' && inputs.dast-on-pr) ||
            (github.event_name != 'pull_request' && inputs.dast-on-push)
          }}
        uses: mmastersvz/central-ci/actions/security-dast-zap@main
        with:
          image-ref: ${{ needs.setup.outputs.docker-tags }}
          load-local: ${{ needs.setup.outputs.docker-push != 'true' }}
          build-context: ./${{ inputs.app-dir }}
          cache-scope: ${{ inputs.app-name }}
          github-token: ${{ secrets.github-token }}

      - name: "Security: Container"
        if: ${{ needs.setup.outputs.docker-push == 'true' }}
        uses: mmastersvz/central-ci/actions/trivy-image-scan@main
        with:
          app-name: ${{ inputs.app-name }}
          image-ref: ${{ needs.setup.outputs.docker-tags }}

  gate:
    name: "Gate"
    runs-on: ubuntu-latest
    if: always()
    needs: [secrets, sast-pre, sca, setup, build]
    steps:
      - name: "Check: All required jobs"
        env:
          RESULTS: ${{ toJSON(needs) }}
        run: |
          set -euo pipefail
          python3 - <<'PYEOF'
          import json, os, sys
          results = json.loads(os.environ["RESULTS"])
          failed = []
          rows = []
          for job, data in sorted(results.items()):
              result = data.get("result", "unknown")
              emoji = {"success": "✅", "skipped": "⏭️", "failure": "❌", "cancelled": "🚫"}.get(result, "⚠️")
              if result not in ("success", "skipped"):
                  failed.append(job)
              rows.append(f"| `{job}` | {emoji} {result} |")
          overall = "✅" if not failed else "❌"
          summary = os.environ.get("GITHUB_STEP_SUMMARY", "")
          if summary:
              with open(summary, "a") as f:
                  f.write(f"### {overall} Gate\n\n")
                  f.write("| Job | Result |\n| --- | --- |\n")
                  f.write("\n".join(rows) + "\n")
          if failed:
              print(f"::error::Gate failed — the following jobs did not succeed: {', '.join(failed)}")
              sys.exit(1)
          print("Gate passed — all required jobs succeeded or were skipped.")
          PYEOF

  release:
    name: "Tag and Release"
    runs-on: ubuntu-latest
    needs: [gate, setup]
    if: github.event_name != 'pull_request'
    permissions:
      contents: write
    steps:
      - uses: mmastersvz/central-ci/actions/release@main
        with:
          new-tag:       ${{ needs.setup.outputs.new-tag }}
          build-version: ${{ needs.setup.outputs.build-version }}
          previous-tag:  ${{ needs.setup.outputs.previous-tag }}
          release-type:  ${{ needs.setup.outputs.release-type }}
          token:         ${{ secrets.github-token }}