name: "CI: Node (reusable)"

on:
  workflow_call:
    inputs:
      app-name:
        required: true
        type: string
      app-dir:
        required: false
        type: string
        default: "."
      language:
        required: false
        default: "python"
        type: string
      tool-versions-path:
        required: false
        default: "./.tool-versions"
        type: string

    secrets:
      github-token:
        required: true

permissions:
  contents: read
  packages: write # Needed for GHCR images
  security-events: write # If you upload SARIF results (Trivy, etc.)

jobs:
  secrets:
    name: "Secrets Scanning"
    runs-on: ubuntu-latest
    steps:
      - name: "Security: Secrets Scanning"
        uses: mmastersvz/central-ci/actions/security-secrets-scans@main
        with:
          github-token: ${{ secrets.github-token }}

  setup:
    name: "Setup"
    runs-on: ubuntu-latest
    outputs:
      build-version: ${{ steps.prep.outputs.build-version }}
      new-tag:       ${{ steps.prep.outputs.new-tag }}
      previous-tag:  ${{ steps.prep.outputs.previous-tag }}
      release-type:  ${{ steps.prep.outputs.release-type }}
      docker-push: ${{ steps.setup-docker.outputs.docker-push }}
      # tools-versions: ${{ steps.tools.outputs.tool-versions }}
      python-version: ${{ steps.setup-app.outputs.python-version }}
      docker-tags: ${{ steps.setup-docker.outputs.docker-tags }}
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Setup: CI"
        id: prep
        uses: mmastersvz/central-ci/actions/setup@main
        with:
          service-name: ${{ inputs.app-name }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: "Setup: APP"
        id: setup-app
        shell: bash
        run: |
          # Resolve Language Name
          LANG_NAME="${{ inputs.language }}"
          [[ "$LANG_NAME" == "python" ]] && LANG_NAME="python"

          # Parse tool version
          tool_version=$(grep "^${LANG_NAME} " "${{ inputs.tool-versions-path }}" | awk '{print $2}')
          if [ -z "$tool_version" ]; then
            echo "::errlatestor::Tool '${LANG_NAME}' not found in ${{ inputs.tool-versions-path }}"
            exit 1
          fi

      - name: "Setup: Docker Metadata"
        id: setup-docker
        uses: mmastersvz/central-ci/actions/setup-docker@main
        with:
          app-name: ${{ inputs.app-name }}
          app-version: ${{ steps.prep.outputs.build-version }}

      # TODO: Python linting (ruff)
      # - name: "Lint: Python Ruff"
      #   working-directory: ${{ inputs.app-dir }}
      #   run: |
      #     pip install ruff
      #     ruff check . --exit-zero

  build:
    name: "Build & Test"
    runs-on: ubuntu-latest
    needs: setup
    defaults:
      run:
        working-directory: ${{ inputs.app-dir }}

    steps:
      - uses: actions/checkout@v4

      - name: "Setup Python: ${{ needs.setup.outputs.python-version }}"
        uses: actions/setup-python@v5
        with:
          python-version: ${{ needs.setup.outputs.python-version }}
          # Caches the pip download cache keyed on requirements.txt hash
          cache: pip
          cache-dependency-path: ${{ inputs.app-dir }}/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: |
          pip install ruff
          ruff check . --exit-zero

      - name: Test
        run: pytest -v --tb=short

      - name: "Docker: Build and Publish Image"
        uses: mmastersvz/central-ci/actions/docker-publish@main
        with:
          registry-password: ${{ secrets.GITHUB_TOKEN }}
          docker-push: ${{ needs.setup.outputs.docker-push }}
          docker-tags: ${{ needs.setup.outputs.docker-tags }}
          context: ${{ inputs.app-dir }}
          cache-scope: ${{ inputs.app-name }}

      # post-security-scans:
      #   name: "Post security scans"
      #   runs-on: ubuntu-latest
      #   needs: [setup, build]
      #   steps:

      - name: "Security: Trivy (container image)"
        if: ${{ needs.setup.outputs.docker-push == 'true' }}
        uses: mmastersvz/central-ci/actions/trivy-image-scan@main
        with:
          app-name: ${{ inputs.app-name }}
          image-ref: ${{ needs.setup.outputs.docker-tags }}
