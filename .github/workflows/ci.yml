name: "CI"

on:
  pull_request:

permissions:
  contents: read

jobs:
  actionlint:
    name: "Lint workflows and actions"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v6

      - name: "Install actionlint"
        shell: bash
        run: |
          bash <(curl -sL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          sudo mv actionlint /usr/local/bin/

      - name: "Run actionlint"
        shell: bash
        run: actionlint

  prettier:
    name: "Check formatting"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v6

      - name: "Run prettier"
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"

      - name: "Check formatting"
        shell: bash
        run: npx prettier --check "**/*.{yml,yaml,md,json}"
