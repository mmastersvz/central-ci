name: "CI: Go (reusable)"

on:
  workflow_call:
    inputs:
      app-name:
        required: true
        type: string
      app-dir:
        required: false
        type: string
        default: "."
      language:
        required: false
        default: "go"
        type: string
      tool-versions-path:
        required: false
        default: "./.tool-versions"
        type: string
    outputs:
      build-version:
        description: "The resolved build version"
        value: ${{ jobs.setup.outputs.build-version }}

permissions:
  contents: read
  packages: write # Needed for GHCR images
  security-events: write # If you upload SARIF results (Trivy, etc.)

jobs:
  secrets:
    name: "Secrets Scanning"
    runs-on: ubuntu-latest
    steps:
      - name: "Security: Secrets Scanning"
        uses: mmastersvz/central-ci/actions/security-secrets-scans@main
        with:
          github-token: ${{ secrets.github-token }}

  setup:
    name: "Setup"
    runs-on: ubuntu-latest
    outputs:
      build-version: ${{ steps.prep.outputs.version }}
      docker-push: ${{ steps.setup-docker.outputs.docker-push }}
      go-version: ${{ steps.setup-app.outputs.go-version }}
      docker-tags: ${{ steps.setup-docker.outputs.docker-tags }}
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Setup: CI"
        id: prep
        uses: mmastersvz/central-ci/actions/setup@main
        with:
          service-name: ${{ inputs.app-name }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: "Setup: APP"
        id: setup-app
        shell: bash
        run: |
          # Resolve Language Name
          LANG_NAME="${{ inputs.language }}"
          [[ "$LANG_NAME" == "go" ]] && LANG_NAME="golang"

          # Parse tool version
          tool_version=$(grep "^${LANG_NAME} " "${{ inputs.tool-versions-path }}" | awk '{print $2}')
          if [ -z "$tool_version" ]; then
            echo "::errlatestor::Tool '${LANG_NAME}' not found in ${{ inputs.tool-versions-path }}"
            exit 1
          fi
          echo "go-version=${tool_version}" >> $GITHUB_OUTPUT

      - name: "Setup: Docker Metadata"
        id: setup-docker
        uses: mmastersvz/central-ci/actions/setup-docker@main
        with:
          app-name: ${{ inputs.app-name }}
          app-version: ${{ steps.prep.outputs.build-version }}

      - name: "Lint: golang"
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest # v1.60 # Recommend upgrading from v2.3/v9
          working-directory: ${{ inputs.app-dir }}

  build:
    name: "Build & Test"
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4

      - name: "Build: Run Go CI"
        uses: mmastersvz/central-ci/actions/go-build-test@main
        with:
          app-dir: ${{ inputs.app-dir }}

      - name: "Docker: Build and Publish Image"
        uses: mmastersvz/central-ci/actions/docker-publish@main
        with:
          registry-password: ${{ secrets.GITHUB_TOKEN }}
          docker-push: ${{ needs.setup.outputs.docker-push }}
          docker-tags: ${{ needs.setup.outputs.docker-tags }}
          context: ${{ inputs.app-dir }}
          cache-scope: ${{ inputs.app-name }}

      # post-security-scans:
      #   name: "Post security scans"
      #   runs-on: ubuntu-latest
      #   needs: [setup, build]
      #   steps:

      - name: "Security: Trivy (container image)"
        if: ${{ needs.setup.outputs.docker-push == 'true' }}
        uses: mmastersvz/central-ci/actions/trivy-image-scan@main
        with:
          app-name: ${{ inputs.app-name }}
          image-ref: ${{ needs.setup.outputs.docker-tags }}
