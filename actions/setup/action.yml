name: "Setup: Version and (TODO: vars)"
description: "Captures the current commit SHA and resolves the service version"

inputs:
  service-name:
    description: "The name of the service"
    required: false
    default: "go-service"
  github-token:
    description: "GitHub token for version resolution"
    required: true

outputs:
  commit_sha:
    description: "The full git commit SHA"
    value: ${{ steps.sha.outputs.commit_sha }}
  version:
    description: "The resolved version from central-ci"
    value: ${{ steps.version.outputs.version }}
  new-tag:
    description: "Computed version tag: semver for releases (e.g. v1.2.3), pre-release for PRs (e.g. 0.0.0-pr.123.5.1)"
    value: ${{ steps.version.outputs.new-tag }}
  build-version:
    description: "Bare version without prefix or v (e.g. 1.2.3 or 0.0.0-pr.123.5.1)"
    value: ${{ steps.version.outputs.build-version }}
  previous-tag:
    description: "Previous release tag. Empty for PR builds."
    value: ${{ steps.version.outputs.previous-tag }}
  release-type:
    description: "Bump type: major, minor, patch, or prerelease"
    value: ${{ steps.version.outputs.release-type}}
  is-prerelease:
    description: "'true' for PR builds, 'false' for release builds"
    value: ${{ steps.version.outcome == 'success' }}

runs:
  using: "composite"
  steps:
    - name: "Checkout"
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Capture commit SHA
      id: sha
      shell: bash
      run: echo "commit_sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

    - name: "Version"
      id: version
      uses: mmastersvz/central-ci/actions/resolve-version@main
      with:
        service: ${{ inputs.service-name }}
        token: ${{ inputs.github-token }}
