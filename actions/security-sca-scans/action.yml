name: "SCA Scan (Trivy)"
description: "SCA scans the source code for vulnerabilities using Trivy"
inputs:
  app-name:
    description: "The name of the application being scanned (for cache key purposes)"
    required: true
  scan-ref:
    description: "The path to scan"
    required: false
    default: "."
  severity:
    description: "Vulnerability severities to include"
    required: false
    default: "CRITICAL,HIGH"
  format:
    description: "The output format for the scan results"
    required: false
    default: "sarif"

runs:
  using: "composite"
  steps:
    - name: Setup Trivy values
      shell: bash
      id: setup
      run: |
        echo "SCAN_REF=${{ inputs.scan-ref }}" >> $GITHUB_OUTPUT
        echo "SEVERITY=${{ inputs.severity }}" >> $GITHUB_OUTPUT
        echo "FORMAT=${{ inputs.format }}" >> $GITHUB_OUTPUT
        echo "APP_NAME=${{ inputs.app-name }}" >> $GITHUB_OUTPUT
        echo "OUTPUT_FILE=trivy-src-results-${{ inputs.app-name }}.${{ inputs.format }}" >> $GITHUB_OUTPUT

    # - name: Setup Trivy Cache
    #   uses: actions/cache@v3
    #   with:

    - name: Trivy FS Scan (source)
      id: trivy-scan
      uses: aquasecurity/trivy-action@0.35.0
      with:
        scan-type: "fs"
        scan-ref: ${{ steps.setup.outputs.SCAN_REF }}
        format: ${{ steps.setup.outputs.FORMAT }}
        output: ${{ steps.setup.outputs.OUTPUT_FILE }}
        severity: ${{ steps.setup.outputs.SEVERITY }}

    - name: Upload Trivy SARIF
      if: ${{ steps.trivy-scan.outcome == 'success' }}
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: ${{ steps.setup.outputs.OUTPUT_FILE }}

    - name: Summary
      if: always()
      shell: bash
      env:
        SCAN_REF: ${{ steps.setup.outputs.SCAN_REF }}
        SEVERITY: ${{ steps.setup.outputs.SEVERITY }}
        OUTPUT_FILE: ${{ steps.setup.outputs.OUTPUT_FILE }}
        TRIVY_OUTCOME: ${{ steps.trivy-scan.outcome }}
      run: |
        if [[ "$TRIVY_OUTCOME" == "success" ]]; then
          STATUS_EMOJI="✅"
        elif [[ "$TRIVY_OUTCOME" == "failure" ]]; then
          STATUS_EMOJI="❌"
        elif [[ "$TRIVY_OUTCOME" == "skipped" ]]; then
          STATUS_EMOJI="⏭️"
        else
          STATUS_EMOJI="⚠️"
        fi
        {
          echo "### ${STATUS_EMOJI} SCA: Trivy"
          echo ""
          echo "<details><summary><strong>Scan Info</strong></summary>"
          echo ""
          echo "| | |"
          echo "| --- | --- |"
          echo "| **Path** | \`${SCAN_REF}\` |"
          echo "| **Severity** | \`${SEVERITY}\` |"
          echo "| **Report** | \`${OUTPUT_FILE}\` |"
          echo "</details>"
        } >> "$GITHUB_STEP_SUMMARY"
