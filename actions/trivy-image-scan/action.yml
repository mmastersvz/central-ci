name: "Trivy Scan"
description: "Scans the source code for vulnerabilities using Trivy"
inputs:
  app-name:
    description: "The name of the application being scanned (for cache key purposes)"
    required: true
  image-ref:
    description: "The container image to scan"
    required: true
  severity:
    description: "Vulnerability severities to include"
    required: false
    default: "CRITICAL,HIGH"

runs:
  using: "composite"
  steps:
    - name: Setup Trivy values
      shell: bash
      id: setup
      run: |
        tmp="${{ inputs.image-ref }}"
        IMAGE_REF="${tmp%%,*}"
        echo "IMAGE_REF=${IMAGE_REF}" >> $GITHUB_OUTPUT
        echo "SEVERITY=${{ inputs.severity }}" >> $GITHUB_OUTPUT
        echo "FORMAT=sarif" >> $GITHUB_OUTPUT
        echo "APP_NAME=${{ inputs.app-name }}" >> $GITHUB_OUTPUT
        echo "OUTPUT_FILE=trivy-image-results-${{ inputs.app-name }}.sarif" >> $GITHUB_OUTPUT

    # - name: Setup Trivy Cache
    #   uses: actions/cache@v3
    #   with:

    - name: Trivy Image Scan
      uses: aquasecurity/trivy-action@0.35.0
      with:
        scan-type: "image"
        image-ref: ${{ steps.setup.outputs.IMAGE_REF }}
        format: ${{ steps.setup.outputs.FORMAT }}
        output: ${{ steps.setup.outputs.OUTPUT_FILE }}
        severity: ${{ steps.setup.outputs.SEVERITY }}

    # - name: Upload Trivy SARIF
    #   uses: github/codeql-action/upload-sarif@v4
    #   with:
    #     sarif_file: ${{ steps.setup.outputs.OUTPUT_FILE }}

    - name: Summary
      if: always()
      shell: bash
      env:
        IMAGE_REF: ${{ steps.setup.outputs.IMAGE_REF }}
        SEVERITY: ${{ steps.setup.outputs.SEVERITY }}
        OUTPUT_FILE: ${{ steps.setup.outputs.OUTPUT_FILE }}
      run: |
        {
          echo "## Trivy Image Scan"
          echo ""
          echo "| | |"
          echo "| --- | --- |"
          echo "| **Image** | \`${IMAGE_REF}\` |"
          echo "| **Severity** | \`${SEVERITY}\` |"
          echo "| **Report** | \`${OUTPUT_FILE}\` |"
        } >> "$GITHUB_STEP_SUMMARY"
