name: "Dotnet Build and Test"
description: "Restores, builds, and tests a .NET project"

inputs:
  build-version:
    description: "The version to apply to the build"
    required: true
  dotnet-version:
    description: "The version of the .NET SDK to use"
    required: false
    default: "8.0.x"
  project-path:
    description: "Path to the project folder"
    required: false
    default: "src/DotnetService"
  working-directory:
    description: "The working directory for the action"
    required: false
    default: "./"

runs:
  using: "composite"
  steps:
    # - name: Debug file structure
    #   shell: bash
    #   working-directory: ${{ inputs.working-directory }}
    #   run: |
    #     pwd
    #     echo "=================-------------================="
    #     ls -la
    #     echo "=================-------------================="
    #     find . -name "*.csproj" -o -name "*.sln" | head -20

    - name: "Setup: .NET"
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ inputs.dotnet-version }}

    - name: Restore
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: dotnet restore ${{ inputs.project-path }}

    - name: Build
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        dotnet publish ${{ inputs.project-path }} \
          -c Release \
          -o ./publish \
          --no-self-contained \
          /p:Version=${{ inputs.build-version }}

    - name: Test
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: dotnet test --no-build -c Release --verbosity normal
