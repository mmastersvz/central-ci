name: "Docker Build, Multi-arch, SBOM, Trivy Scan"
description: "Builds a Docker image for multiple architectures, generates an SBOM, and performs a Trivy vulnerability scan. Optionally pushes to GHCR."

inputs:
  dockerfile:
    required: true
    description: "Path to the Dockerfile to build (e.g. './Dockerfile')"
  push:
    required: false
    default: "false"
    description: "Whether to push the built image to GHCR (default: false). Requires GHCR permissions."

runs:
  using: composite
  steps:
    - name: Login to GHCR
      if: inputs.push == 'true'
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ github.token }}

    - name: Build & Push (multi-arch)
      uses: docker/build-push-action@v7
      with:
        context: .
        file: ${{ inputs.dockerfile }}
        push: ${{ inputs.push }}
        tags: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:${{ github.sha }}
        platforms: linux/amd64,linux/arm64
        cache-from: type=gha
        cache-to: type=gha,mode=max
        sbom: true
        provenance: mode=max

    - name: Trivy FS Scan (source)
      uses: aquasecurity/trivy-action@0.35.0
      with:
        scan-type: "fs"
        scan-ref: "."
        format: "sarif"
        output: "trivy-results.sarif"
        severity: "CRITICAL,HIGH"

    - name: Upload Trivy SARIF
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: "trivy-results.sarif"
