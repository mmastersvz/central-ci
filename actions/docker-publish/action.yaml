name: "Docker Build and Push"
description: "Log in to GHCR and build/push a multi-platform image"
inputs:
  registry-password:
    description: "The GitHub Token or password for the registry"
    required: true
  docker-push:
    description: "Whether to push the image"
    required: true
    default: "false"
  docker-tags:
    description: "Comma-separated list of tags"
    required: true
  context:
    description: "Docker build context"
    required: false
    default: "."
  cache-scope:
    description: "Scope for the GHA cache"
    required: true

runs:
  using: "composite"
  steps:
    - name: Login to GHCR
      if: ${{ inputs.docker-push == 'true' }}
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ inputs.registry-password }}

    - name: Set up Docker Buildx
      id: buildx
      uses: docker/setup-buildx-action@v4
      # with:
      #   driver: docker-container

    - name: Build & Push
      uses: docker/build-push-action@v7
      with:
        builder: ${{ steps.buildx.outputs.name }}
        context: ${{ inputs.context }}
        push: ${{ inputs.docker-push }}
        tags: ${{ inputs.docker-tags }}
        platforms: linux/amd64,linux/arm64
        cache-from: type=gha,scope=${{ inputs.cache-scope }}
        cache-to: type=gha,mode=max,scope=${{ inputs.cache-scope }}
        sbom: true
        provenance: mode=max
