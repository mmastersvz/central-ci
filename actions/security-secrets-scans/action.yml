name: Secrets Scan
description: Scans git history for leaked secrets using Gitleaks and TruffleHog

inputs:
  github-token:
    description: GitHub token for Gitleaks authentication
    required: true
  default-branch:
    description: Default branch to use as TruffleHog scan base
    required: false
    default: main
  trufflehog-extra-args:
    description: Extra arguments to pass to TruffleHog
    required: false
    default: --only-verified
  do-checkout:
    description: "Whether to perform a git checkout (default: true)"
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - uses: actions/checkout@v4
      if: ${{ inputs.do-checkout != 'false' }} # Allow skipping checkout for Docker build contexts, etc.
      with:
        fetch-depth: 0

    - name: "Security: Secrets | Gitleaks – scan history"
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}

    - name: Upload Gitleaks SARIF
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: results.sarif
        category: gitleaks

    - name: "Security: Secrets | TruffleHog – entropy scan"
      uses: trufflesecurity/trufflehog@v3.94.3
      with:
        # If base is empty, we fall back to the SHA logic
        path: ${{ inputs.path }}
        # base: ${{ inputs.base || github.event.pull_request.base.sha || github.sha }}
        # head: ${{ inputs.head }}
        extra_args: ${{ inputs.extra_args }}

    # - name: Upload TruffleHog SARIF
    #   uses: github/codeql-action/upload-sarif@v4
    #   with:
    #     sarif_file: trufflehog.sarif
    #     category: trufflehog

    - name: Summary
      if: always()
      shell: bash
      run: |
        {
          echo "## Secrets Scan"
          echo ""
          echo "| Tool | Scope |"
          echo "| --- | --- |"
          echo "| **Gitleaks** | full git history |"
          echo "| **TruffleHog** | entropy scan |"
        } >> "$GITHUB_STEP_SUMMARY"
