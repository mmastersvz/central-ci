name: "SAST Scan (Semgrep)"
description: >
  Runs Semgrep (via official Docker image) static analysis.
  Designed for multi-language repos and monorepos.

inputs:
  skip-semgrep:
    description: "Whether to skip the Semgrep scan (default: false)"
    required: false
    default: "false"

  semgrep-app-token:
    description: >
      Semgrep AppSec Platform token. If provided, uses platform rules + advanced features.
      If omitted, runs in pure OSS mode with the rulesets defined in `semgrep-config`.
    required: false

  semgrep-config:
    description: >
      Space-separated Semgrep rulesets/configs to use in OSS mode (no token).
      Ignored when `semgrep-app-token` is supplied.
    required: false
    default: "p/default p/owasp-top-ten p/cwe-top-25 p/secrets"

  semgrep-output-file:
    description: "The filename for the Semgrep SARIF output (default: semgrep-results.sarif)"
    required: false
    default: "semgrep-results.sarif"

  semgrep-image-tag:
    description: "The tag of the Semgrep Docker image to use (default: 1.159.0)"
    required: false
    default: "1.159.0"

  do-checkout:
    description: "Whether to perform a git checkout (default: true)"
    required: false
    default: "true"

  working-directory:
    description: >
      Working directory for Semgrep scan (relative to repo root).
    required: false
    default: "."

runs:
  using: "composite"

  steps:
    - name: Checkout repository
      if: ${{ inputs.do-checkout != 'false' }} # Allow skipping checkout for Docker build contexts, etc.
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Important for diff-aware Semgrep scans on PRs

    # ====================== Semgrep ======================
    - name: Cache Semgrep Docker image
      uses: ScribeMD/docker-cache@0.5.0
      if: ${{ inputs.skip-semgrep != 'true' }}
      with:
        key: docker-semgrep-v1-${{ runner.os }}

    - name: Run Semgrep
      id: semgrep-run
      if: ${{ inputs.skip-semgrep != 'true' }}
      shell: bash
      env:
        SEMGREP_APP_TOKEN: ${{ inputs.semgrep-app-token || '' }}
        OUTPUT_FILE: ${{ inputs.semgrep-output-file }}
        SEMGREP_CONFIG: ${{ inputs.semgrep-config }}
        IMAGE_TAG: ${{ inputs.semgrep-image-tag }}
        WORKING_DIR: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail
        if [[ -n "$SEMGREP_APP_TOKEN" ]]; then
          echo "Running Semgrep with AppSec Platform token (config from platform, not local)"
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/src" \
            -w "/src/${WORKING_DIR}" \
            -e SEMGREP_APP_TOKEN \
            "semgrep/semgrep:${IMAGE_TAG}" \
            semgrep ci --sarif --output "/src/${OUTPUT_FILE}"
        else
          echo "Running Semgrep in OSS mode with config: ${SEMGREP_CONFIG}"
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/src" \
            -w "/src/${WORKING_DIR}" \
            "semgrep/semgrep:${IMAGE_TAG}" \
            semgrep scan --config "${SEMGREP_CONFIG}" --sarif --output "/src/${OUTPUT_FILE}"
        fi

    - name: Upload Semgrep SARIF
      if: ${{ steps.semgrep-run.outcome == 'success' }}
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: ${{ inputs.semgrep-output-file }}
        category: semgrep
        checkout_path: ${{ github.workspace }}

    - name: Summary
      if: always()
      shell: bash
      env:
        CONFIG: ${{ inputs.semgrep-config }}
        WORKING_DIR: ${{ inputs.working-directory }}
        SKIPPED: ${{ inputs.skip-semgrep }}
        OUTPUT_FILE: ${{ inputs.semgrep-output-file }}
        SEMGREP_OUTCOME: ${{ steps.semgrep-run.outcome }}
      run: |
        if [[ "$SEMGREP_OUTCOME" == "success" ]]; then
          STATUS_EMOJI="✅"
        elif [[ "$SEMGREP_OUTCOME" == "failure" ]]; then
          STATUS_EMOJI="❌"
        elif [[ "$SEMGREP_OUTCOME" == "skipped" ]]; then
          STATUS_EMOJI="⏭️"
        else
          STATUS_EMOJI="⚠️"
        fi
        {
          echo "### ${STATUS_EMOJI} SAST: Semgrep"
          echo ""
          echo "<details><summary><strong>Semgrep Info</strong></summary>"
          echo ""
          echo "| | |"
          echo "| --- | --- |"
          echo "| **Config** | \`${CONFIG}\` |"
          echo "| **Working dir** | \`${WORKING_DIR}\` |"
          echo "| **Skipped** | ${SKIPPED} |"
          echo "| **Report** | \`${OUTPUT_FILE}\` |"
          echo "</details>"
        } >> "$GITHUB_STEP_SUMMARY"
