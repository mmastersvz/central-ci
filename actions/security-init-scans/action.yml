name: "Security Scans"
description: "Runs secret scanning and Trivy source scans"
inputs:
  app-name:
    description: "Name of the application"
    required: true
  app-dir:
    description: "Directory to scan"
    required: false
    default: "."
  base:
    description: "The base commit to scan from"
    required: false
  head:
    description: "The head commit to scan to"
    required: false
    default: "HEAD"
  path:
    description: "The path to scan"
    required: false
    default: "./"
  extra_args:
    description: "Additional arguments for TruffleHog"
    required: false
    default: "--results=verified,unknown"

runs:
  using: "composite"
  steps:
    - name: "Checkout"
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Debug GitHub context for TruffleHog
      shell: bash
      run: |
        echo "Event name: ${{ github.event_name }}"
        echo "Default branch: ${{ github.event.repository.default_branch }}"
        echo "ref_name: ${{ github.ref_name }}"
        echo "SHA: ${{ github.sha }}"
        echo "Base ref: ${{ github.event.pull_request.base.ref }}"
        echo "Head ref: ${{ github.event.pull_request.head.ref }}"
        echo "Base SHA: ${{ github.event.pull_request.base.sha }}"
        echo "Head SHA: ${{ github.event.pull_request.head.sha }}"
        git log --oneline -5

    - name: Get previous commit for TruffleHog
      id: prev-commit
      shell: bash
      run: |
        if [[ "${{ github.event_name }}" == "pull_request" ]]; then
          echo "base=${{ github.event.pull_request.base.sha }}" >> $GITHUB_OUTPUT
        else
          # On push: use the parent of the current commit (HEAD~1)
          PREV=$(git rev-parse HEAD~1 2>/dev/null || echo "")
          if [[ -z "$PREV" ]]; then
            echo "base=" >> $GITHUB_OUTPUT          # empty = scan full history (safe for first commit)
          else
            echo "base=$PREV" >> $GITHUB_OUTPUT
          fi
        fi

    - name: "Security: Secret Detection (TruffleHog)"
      uses: trufflesecurity/trufflehog@v3.94.3
      with:
        path: ${{ inputs.path || github.workspace }}
        # base: ${{ inputs.base || github.event.pull_request.base.sha || github.event.repository.default_branch }}
        base: ${{ steps.prev-commit.outputs.base }}
        # base: ""
        # base: HEAD~1
        # head: ${{ inputs.head || github.event.pull_request.head.sha || github.sha }}
        head: HEAD
        extra_args: --results=verified,unknown
        # extra_args: ${{ inputs.extra_args }}

    - name: "Security Scan: Trivy (source code)"
      uses: mmastersvz/central-ci/actions/trivy-source-scan@main
      with:
        app-name: ${{ inputs.app-name }}
        scan-ref: ${{ inputs.app-dir }}
